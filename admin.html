<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kumkum Collection | Admin Portal Offline</title>
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="./public/images/logo.jpg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0c0a09;
      overflow: hidden;
    }
    #admin-lock-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0c0a09;
      color: #ffffff;
      z-index: 99999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }
    .lock-card {
      max-width: 540px;
      width: 100%;
      background: #1c1917;
      border: 2px solid #ea580c;
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 25px 50px -12px rgba(234, 88, 12, 0.25);
      box-sizing: border-box;
    }
    .lock-icon {
      width: 70px;
      height: 70px;
      background: rgba(234, 88, 12, 0.15);
      color: #f97316;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      border: 1px solid rgba(249, 115, 22, 0.3);
    }
    .lock-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 12px;
      letter-spacing: 0.5px;
    }
    .lock-desc {
      font-size: 14px;
      color: #d6d3d1;
      line-height: 1.6;
      margin: 0 0 24px;
      font-weight: 500;
    }
    .lock-alert {
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 16px;
      padding: 18px;
    }
    .lock-alert-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fed7aa;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .lock-alert-text {
      font-size: 15px;
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Permanent Un-bypassable Neutral Admin Suspension Lock Overlay -->
  <div id="admin-lock-overlay">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h1 class="lock-title">Admin Panel Temporarily Taken Down</h1>
      <p class="lock-desc">
        Access to the administration portal and inventory management has been temporarily taken offline.
      </p>
      <div class="lock-alert">
        <span class="lock-alert-label">Notice</span>
        <div class="lock-alert-text">Please contact the web developer for further assistance.</div>
      </div>
    </div>
  </div>

  <div id="root" style="display:none;"></div>
</body>
</html>
